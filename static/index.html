<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Psychologist</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons for nice SVGs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Menu -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="brain-circuit" class="logo-icon"></i>
                <h2>Psyche AI</h2>
            </div>
            
            <div class="therapist-selection">
                <h3>Select Therapist</h3>
                <div class="therapist-list">
                    <button class="therapist-btn active" data-persona="Dr. Focus: ADHD Assessment">
                        <div class="avatar aria-avatar">F</div>
                        <div class="therapist-info">
                            <span class="name">Dr. Focus</span>
                            <span class="specialty">ADHD Assessment</span>
                        </div>
                    </button>
                </div>
            </div>
            
            <div style="margin-top: auto; padding-top: 20px;">
                <button class="btn primary-btn" id="generate-report-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i data-lucide="file-text"></i> Generate Report
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="current-therapist">
                    <div class="avatar aria-avatar" id="header-avatar">F</div>
                    <div>
                        <h2 id="header-name">Dr. Focus</h2>
                        <span class="status"><span class="status-dot"></span> Online</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Toggle Audio" id="audio-toggle-btn"><i data-lucide="volume-2" id="audio-icon"></i></button>
                    <button class="icon-btn" title="Clear Chat" id="clear-chat-btn"><i data-lucide="trash-2"></i></button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Initial welcome message generated via JS -->
            </div>

            <div class="chat-input-container">
                <form id="chat-form" class="chat-form">
                    <textarea id="message-input" placeholder="Share your thoughts..." rows="1"></textarea>
                    <button type="button" class="mic-btn" id="mic-btn" title="Hold to speak or click to toggle">
                        <i data-lucide="mic"></i>
                    </button>
                    <button type="submit" class="send-btn" id="send-btn">
                        <i data-lucide="send"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>
    
    <!-- Report Modal -->
    <div class="modal-overlay" id="report-modal">
        <div class="modal-content report-modal-content">
            <div class="modal-header">
                <h2><i data-lucide="clipboard-list"></i> Clinical Assessment Report</h2>
                <button class="icon-btn close-modal-btn" id="close-report-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body report-body" id="report-content">
                <div class="loading-state" id="report-loading">
                    <div class="typing-indicator" style="margin: 0 auto; justify-content: center; padding: 40px;">
                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                    </div>
                    <p style="text-align: center; color: var(--text-muted);">Synthesizing clinical report...</p>
                </div>
                <div id="report-markdown" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn primary-btn" id="download-report-btn">Download / Print</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
